<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="320" height="120" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C63FF"></stop>
      <stop offset="100%" stop-color="#4CAF50"></stop>
    </linearGradient>
  </defs>

  <!-- Bug icon -->
  <g transform="translate(40,60)" fill="none" stroke="url(#g)" stroke-width="4" stroke-linecap="round">
    <!-- body -->
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="url(#g)" stroke="none"></ellipse>
    <!-- head -->
    <circle cx="0" cy="-28" r="10" fill="url(#g)" stroke="none"></circle>
    <!-- legs -->
    <line x1="-18" y1="-6" x2="-32" y2="-14"></line>
    <line x1="-18" y1="6" x2="-32" y2="14"></line>
    <line x1="18" y1="-6" x2="32" y2="-14"></line>
    <line x1="18" y1="6" x2="32" y2="14"></line>
    <!-- antennae -->
    <line x1="-4" y1="-38" x2="-12" y2="-50"></line>
    <line x1="4" y1="-38" x2="12" y2="-50"></line>
  </g>

  <!-- Text -->
  <text x="100" y="70" font-family="Inter, Segoe UI, Roboto, sans-serif" font-size="36" font-weight="700" fill="#1F2937">
    Bug<tspan fill="#6C63FF">Nest</tspan>
  </text>
</svg>
